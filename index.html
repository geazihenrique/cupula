<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Cúpulas</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar glass-card">
        <div class="brand-block">
          <span class="eyebrow">Gerador</span>
          <h1>Gerador de Cúpulas</h1>
        </div>

        <form id="config-form" class="config-form" novalidate>
          <div class="field-grid">
            <label class="field">
              <span>Largura</span>
              <div class="input-with-unit">
                <input id="largura" name="largura" type="number" min="1" step="1" value="300" />
                <span>mm</span>
              </div>
            </label>

            <label class="field">
              <span>Profundidade</span>
              <div class="input-with-unit">
                <input id="profundidade" name="profundidade" type="number" min="1" step="1" value="200" />
                <span>mm</span>
              </div>
            </label>

            <label class="field">
              <span>Altura</span>
              <div class="input-with-unit">
                <input id="altura" name="altura" type="number" min="1" step="1" value="150" />
                <span>mm</span>
              </div>
            </label>

            <label class="field">
              <span>Espessura</span>
              <select id="espessura" name="espessura">
                <option value="2">2 mm</option>
                <option value="3" selected>3 mm</option>
                <option value="4">4 mm</option>
                <option value="5">5 mm</option>
                <option value="6">6 mm</option>
                <option value="8">8 mm</option>
                <option value="10">10 mm</option>
              </select>
            </label>
          </div>

          <div class="field-group">
            <span class="group-label">Tipo de medida</span>
            <div class="segmented-control" data-segmented="tipoMedida">
              <button type="button" class="segment is-active" data-value="externa">Externa</button>
              <button type="button" class="segment" data-value="interna">Interna</button>
            </div>
          </div>

          <div class="field-group">
            <span class="group-label">Tipo da cúpula</span>
            <div class="segmented-control" data-segmented="tipoCupula">
              <button type="button" class="segment is-active" data-value="aberta">Aberta</button>
              <button type="button" class="segment" data-value="fechada">Fechada</button>
            </div>
          </div>

          <label class="field">
            <span>Tipo de montagem</span>
            <select id="tipoMontagem" name="tipoMontagem">
              <option value="dentro" selected>Laterais por dentro da frente e fundo</option>
              <option value="fora">Laterais por fora da frente e fundo</option>
            </select>
          </label>

          <div id="validation-message" class="message-banner error hidden" aria-live="polite"></div>
          <div id="recommendation-message" class="message-banner warning hidden" aria-live="polite"></div>

          <div class="actions">
            <button id="download-dxf" type="button" class="primary-button">Baixar DXF</button>
            <button id="reset-form" type="button" class="ghost-button">Limpar</button>
          </div>
        </form>
      </aside>

      <main class="main-content">
        <section class="hero-grid">
          <article class="glass-card viewer-card">
            <div class="card-header">
              <div>
                <span class="eyebrow">Preview 3D</span>
                <h2>Visualização da cúpula</h2>
              </div>
              <div class="view-switcher">
                <button type="button" class="mode-button is-active" data-view-mode="montada">Montada</button>
                <button type="button" class="mode-button" data-view-mode="explodida">Explodida</button>
              </div>
            </div>
            <div id="three-container" class="three-container"></div>
          </article>

          <article class="glass-card summary-card">
            <div class="card-header">
              <div>
                <span class="eyebrow">Resumo</span>
                <h2>Resumo técnico</h2>
              </div>
            </div>
            <div id="summary-grid" class="summary-grid"></div>
          </article>
        </section>

        <section class="content-grid">
          <article class="glass-card">
            <div class="card-header">
              <div>
                <span class="eyebrow">Peças</span>
                <h2>Tabela de corte</h2>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Peça</th>
                    <th>Quantidade</th>
                    <th>Largura</th>
                    <th>Altura/Profundidade</th>
                    <th>Espessura</th>
                    <th>Observação</th>
                  </tr>
                </thead>
                <tbody id="parts-table-body"></tbody>
              </table>
            </div>
          </article>

          <article class="glass-card">
            <div class="card-header">
              <div>
                <span class="eyebrow">Corte</span>
                <h2>Preview 2D</h2>
              </div>
            </div>
            <div id="preview-2d" class="preview-2d"></div>
          </article>
        </section>
      </main>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
